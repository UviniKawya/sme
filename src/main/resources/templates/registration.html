<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Registration - SME Digital Readiness</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-xl border border-gray-200 p-8">
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-gray-900">SME Registration</h2>
                <p class="text-gray-600 mt-2">Enter your business details to get started with the digital readiness assessment.</p>
            </div>

            <form id="registration-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">SME ID</label>
                        <input type="text" id="smeId" name="smeId" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g., SME-001">
                        <p class="text-xs text-gray-500 mt-1">Unique identifier for your business</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Business Type</label>
                        <input type="text" id="businessType" name="businessType" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g., Retail, Manufacturing">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Location</label>
                        <select id="location" name="location" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="">Select location</option>
                            <option value="URBAN">Urban</option>
                            <option value="RURAL">Rural</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Number of Employees</label>
                        <select id="employees" name="employees" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="">Select range</option>
                            <option value="1-10">1-10</option>
                            <option value="11-50">11-50</option>
                            <option value="51-100">51-100</option>
                            <option value="100+">100+</option>
                        </select>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Years of Operation</label>
                        <select id="yearsOfOperation" name="yearsOfOperation" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="">Select range</option>
                            <option value="0-1">Less than 1 year</option>
                            <option value="1-3">1-3 years</option>
                            <option value="3-5">3-5 years</option>
                            <option value="5+">5+ years</option>
                        </select>
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-200">
                    <div class="flex justify-end gap-3">
                        <a href="/" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                            Cancel
                        </a>
                        <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                            Register & Continue
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Success Message -->
        <div id="success-message" class="hidden mt-6 bg-green-50 border border-green-200 rounded-xl p-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center">
                    <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <div>
                    <h3 class="font-semibold text-green-800">Registration Successful!</h3>
                    <p class="text-green-600 text-sm">Your SME profile has been created.</p>
                </div>
            </div>
            <div class="mt-4 flex gap-3">
                <a href="/assessment" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                    Start Assessment
                </a>
                <a href="/" class="px-4 py-2 border border-green-600 text-green-600 rounded-lg hover:bg-green-50">
                    Return to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>

<script src="/js/registration.js"></script>
</body>
</html>

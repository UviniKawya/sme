<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Assessment - SME Digital Readiness</title>
</head>
<body>
<div layout:fragment="content">
    <div class="flex gap-6 h-full">
        <!-- Main Assessment -->
        <div class="flex-1">
            <div class="bg-white rounded-xl border border-gray-200 p-8">
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-gray-900">Digital Readiness Assessment</h2>
                    <p class="text-gray-600 mt-2">Answer all questions to evaluate your SME's digital maturity.</p>
                </div>

                <!-- SME ID selector -->
                <div class="mb-8 p-4 bg-gray-50 rounded-lg">
                    <label class="block text-sm font-medium text-gray-700 mb-2">SME ID</label>
                    <input type="text" id="smeId" placeholder="Enter SME ID (e.g., SME-001)"
                           class="w-full max-w-xs px-4 py-2 border border-gray-300 rounded-lg">
                    <p class="text-xs text-gray-500 mt-1">Enter your SME ID to save/resume assessment</p>
                </div>

                <!-- Sections -->
                <div id="assessment-sections" class="space-y-6">
                    <!-- Dynamically populated -->
                </div>
            </div>
        </div>

        <!-- Right Summary Panel -->
        <div class="w-80 xl:w-96">
            <div class="bg-white rounded-xl border border-gray-200 p-6 sticky top-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Assessment Progress</h3>

                <!-- Overall Score -->
                <div class="mb-6">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm text-gray-600">Progress</span>
                        <span class="text-sm font-medium" id="progress-text">0/25</span>
                    </div>
                    <div class="h-3 bg-gray-200 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-600 rounded-full transition-all duration-500" id="progress-bar" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Section Scores -->
                <div class="space-y-4" id="section-scores">
                    <!-- Dynamically populated -->
                </div>

                <div class="mt-6 pt-4 border-t border-gray-200">
                    <button id="submit-assessment" class="w-full px-4 py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
                            disabled>
                        Submit Assessment
                    </button>
                    <button id="reset-assessment" class="w-full mt-2 px-4 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                        Reset All
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/assessment.js"></script>
</body>
</html>

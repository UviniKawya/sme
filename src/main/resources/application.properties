# Server configuration
server.port=8080
server.servlet.context-path=/

# Spring configuration
spring.application.name=SME Digital Readiness Assessment

# Thymeleaf configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html

# Database configuration (H2 for demo)
spring.datasource.url=jdbc:h2:mem:digitalreadinessdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Initialize database with seed data
spring.sql.init.mode=always

# Jackson date format
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# Logging
logging.level.org.springframework=INFO
logging.level.com.sme.digitalreadiness=DEBUG
